<main class="section"><div class="container">
  <h2>Contact & Réseaux</h2>
  <p class="intro">Écrivez‑nous pour proposer un séminaire, un atelier, ou un partenariat.</p>
  <div class="grid">
    <article class="card" style="grid-column:span 7;">
      <form id="contactForm">
        <label>Nom<br><input required placeholder="Votre nom" style="width:100%;padding:10px;border-radius:10px;border:var(--border);background:rgba(255,255,255,.02);color:var(--text)"></label>
        <label style="display:block;margin-top:10px;">Email<br><input type="email" required placeholder="vous@exemple.org" style="width:100%;padding:10px;border-radius:10px;border:var(--border);background:rgba(255,255,255,.02);color:var(--text)"></label>
        <label style="display:block;margin-top:10px;">Message<br><textarea rows="6" required placeholder="Votre message…" style="width:100%;padding:10px;border-radius:10px;border:var(--border);background:rgba(255,255,255,.02);color:var(--text)"></textarea></label>
        <div style="display:flex;gap:10px;align-items:center;margin-top:10px;">
          <button class="btn" type="submit">Envoyer</button>
          <small id="formMsg" style="color:var(--muted)">Réponse sous 48h.</small>
        </div>
      </form>
    </article>
    <article class="card" style="grid-column:span 5;">
      <h3>Coordonnées</h3>
